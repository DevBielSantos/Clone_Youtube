<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
    <title>Youtube Clone</title>
</head>
<body>
    <div class="container">
        <header>
            <nav class="navbar">
                <div class="nav-section nav-left">
                    <button class="nav-button menu-button">
                        <i class="uil uil-bars"></i>
                    </button>
                    <a href="#" class="nav-logo">
                    <img src="img/Youtube logo.png" alt="Logo" class="logo-image">
                    <h2 class="logo-text">Youtube</h2>
                    </a>
                </div>

                <div class="nav-section nav-center">
                    <form action="#" class="search-form">
                        <input type="search"  placeholder="Buscar" required class="search-input">
                          <button class="nav-button search-button">
                        <i class="uil uil-search"></i>
                    </button>
                    </form>
                      <button class="nav-button mic-button">
                        <i class="uil uil-microphone"></i>
                    </button>
                </div>

                <div class="nav-section nav-right">
                      <button class="nav-button theme-button">
                        <i class="uil uil-moon"></i>
                    </button>
                    <img src="img/WhatsApp Image 2026-03-17 at 10.01.28.jpeg" alt="Imagem do usuário" class="usuario-image">
                </div>
            </nav>
        </header>
    </div>
</body>
</html>
